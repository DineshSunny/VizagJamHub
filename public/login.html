<!DOCTYPE html>
<html>

<head>

<!-- =================================
     Page Title
================================= -->

<title>Vizag JamHub Admin Login</title>

<!-- Main website styling -->
<link rel="stylesheet" href="/css/style.css">

<!-- MOBILE VIEW -->
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  
</head>

<body>

<!-- =================================
     VIDEO BACKGROUND
     Concert video playing behind page
================================= -->

<video autoplay muted loop playsinline id="bg-video">
<source src="/Video/1.mp4" type="video/mp4">
</video>


<!-- =================================
     LOGIN SECTION
     Admin authentication area
================================= -->

<section class="login-section">

<h1 class="login-title">Vizag JamHub Admin</h1>

<form class="login-form">

<!-- Username input (not used anymore, kept for UI) -->
<input id="username" placeholder="Username" required>

<!-- Password input (not used anymore, kept for UI) -->
<input id="password" type="password" placeholder="Password" required>

<!-- Login button triggers Firebase login -->
<button type="button" onclick="login()">Login</button>

<!-- Forgot password replaced with info -->
<p class="forgot">
<a onclick="forgotPassword()">Forgot Password?</a>
</p>

</form>

</section>


<!-- =================================
     FIREBASE AUTHENTICATION SCRIPT
     Handles secure Google login
================================= -->

<script type="module">

/* ================================
   Import Firebase SDK (Web)
================================ */

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";


/* ================================
   Firebase Configuration
================================ */

const firebaseConfig = {
  apiKey: "AIzaSyCBdBQ7wvLJkeGyMByazMigfDO9MRZEhl0",
  authDomain: "vizagjamhub-d428a.firebaseapp.com",
  projectId: "vizagjamhub-d428a",
  storageBucket: "vizagjamhub-d428a.firebasestorage.app",
  messagingSenderId: "577169499041",
  appId: "1:577169499041:web:2d5ed9a35f62dbe847a1e0",
  measurementId: "G-50M7EK2Y5D"
};


/* ================================
   Initialize Firebase
================================ */

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();


/* ================================
   LOGIN FUNCTION
   Triggered when button clicked
================================ */

window.login = async function () {

  try {

    const result = await signInWithPopup(auth, provider);
    const user = result.user;

    // 🔐 ADMIN ACCESS CONTROL
    if (user.email === "vizagjamhub@gmail.com") {

      window.location.href = "/admin.html";

    } else {

      alert("Not authorized");

    }

  } catch (error) {

    console.error(error);
    alert("Login failed");

  }

};


/* ================================
   FORGOT PASSWORD (DISABLED)
================================ */

window.forgotPassword = function () {

  alert("Use Google login. No password required.");

};

</script>

</body>
</html>
