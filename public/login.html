<!DOCTYPE html>
<html>

<head>

<!-- =================================
     Page Title
================================= -->

<title>Vizag JamHub Admin Login</title>

<!-- Main website styling -->
<link rel="stylesheet" href="/css/style.css">

</head>

<body>

<!-- =================================
     VIDEO BACKGROUND
     Concert video playing behind page
================================= -->

<video autoplay muted loop playsinline id="bg-video">
<source src="/Video/1.mp4" type="video/mp4">
</video>


<!-- =================================
     LOGIN SECTION
     Admin authentication area
================================= -->

<section class="login-section">

<h1 class="login-title">Vizag JamHub Admin</h1>

<form class="login-form">

<!-- Username input -->

<input id="username" placeholder="Username" required>

<!-- Password input -->

<input id="password" type="password" placeholder="Password" required>

<!-- Login button triggers login() in auth.js -->

<button type="button" onclick="login()">Login</button>

<!-- Forgot password link triggers forgotPassword() -->

<p class="forgot">
<a onclick="forgotPassword()">Forgot Password?</a>
</p>

</form>

</section>


<!-- =================================
     AUTHENTICATION SCRIPT
     Handles login / logout / reset
================================= -->

<script src="/js/auth.js"></script>

</body>
</html>
