<!-- BUTTONS -->

style="
margin-top:40px;
display:flex;
flex-direction:column;
align-items:center;
gap:20px;
"></div>

</div>

</section>

<script>

const params = new URLSearchParams(window.location.search);
const type = params.get("type");

const container = document.getElementById("languageOptions");
const title = document.getElementById("title");

/* TELUGU */

if(type === "telugu"){

title.innerText = "Select Telugu Language";

container.innerHTML = `

<a href="/telugusongs.html?script=english"
class="lyrics-btn"
style="width:240px; text-align:center;">

English

</a>

<a href="/telugusongs.html?script=native"
class="lyrics-btn"
style="width:240px; text-align:center;">

తెలుగు

</a>

`;

}

/* HINDI */

if(type === "hindi"){

title.innerText = "Select Hindi Language";

container.innerHTML = `

<a href="/hindisongs.html?script=english"
class="lyrics-btn"
style="width:240px; text-align:center;">

English

</a>

<a href="/hindisongs.html?script=native"
class="lyrics-btn"
style="width:240px; text-align:center;">

हिंदी

</a>

`;

}

/* INVALID */

if(!type){

title.innerText = "Invalid Access";

container.innerHTML = `

<a href="/category.html"
class="lyrics-btn"
style="width:240px; text-align:center;">

Go to Categories

</a>

`;

}

</script>




<!-- =================================
     TOP PAGE LIVE TEXT SCRIPT
================================= -->

<script>

const words = [

"LIVE MUSIC",
"JAM SESSIONS",
"VIZAG CULTURE",
"NIGHT VIBES",
"LIVE PERFORMANCES",
"MUSIC COMMUNITY"

];

const typing = document.getElementById("typing");

let index = 0;

typing.textContent = words[index];

typing.classList.add("show");

setInterval(() => {

typing.classList.remove("show");
typing.classList.add("hide");

setTimeout(() => {

index = (index + 1) % words.length;

typing.textContent = words[index];

typing.classList.remove("hide");
typing.classList.add("show");

}, 900);

}, 3200);

</script>
