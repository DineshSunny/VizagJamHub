<!DOCTYPE html>
<html>

<head>

<title>Select Script | Vizag JamHub</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/css/style.css">

<link rel="stylesheet"
      href="/css/mobile.css"
      media="screen and (max-width:768px)">

</head>

<body>

<!-- VIDEO BACKGROUND -->

<video autoplay muted loop playsinline preload="metadata" id="bg-video">
<source src="/Video/3.mp4" type="video/mp4">
</video>

<!-- TOP LOGO -->

<div class="top-logo">
<img src="/Images/Logo.png">
</div>

<!-- HEADER -->

<header>

<nav>

<!-- HAMBURGER ICON -->

<div class="menu-toggle">&#9776;</div>

<!-- SLIDE MENU -->

<ul class="nav-links">

<li><a href="/index.html">Home</a></li>

<li><a href="/category.html">Sing Along Lyrics</a></li>

<li><a href="/guitar.html">Guitar</a></li>

<li><a href="/drums.html">Drums</a></li>

<li><a href="/vocals.html">Vocals</a></li>

<li><a href="/index.html#shows">Shows</a></li>

<li><a href="/index.html#connect">Band Connect</a></li>

<li><a href="/index.html#gallery">Gallery</a></li>

</ul>

</nav>

</header>

<!-- HERO -->

<section class="hero">

<div class="hero-content">

<h1 id="title">Select Script</h1>

<!-- BUTTONS -->

<div id="languageOptions"
style="
margin-top:40px;
display:flex;
flex-direction:column;
align-items:center;
gap:20px;
"></div>

</div>

</section>

<script>

const params = new URLSearchParams(window.location.search);
const type = params.get("type");

const container = document.getElementById("languageOptions");
const title = document.getElementById("title");

/* TELUGU */

if(type === "telugu"){

title.innerText = "Select Telugu Language";

container.innerHTML = `

<a href="/telugusongs.html?script=english"
class="lyrics-btn"
style="width:240px; text-align:center;">

English

</a>

<a href="/telugusongs.html?script=native"
class="lyrics-btn"
style="width:240px; text-align:center;">

తెలుగు

</a>

`;

}

/* HINDI */

if(type === "hindi"){

title.innerText = "Select Hindi Language";

container.innerHTML = `

<a href="/hindisongs.html?script=english"
class="lyrics-btn"
style="width:240px; text-align:center;">

English

</a>

<a href="/hindisongs.html?script=native"
class="lyrics-btn"
style="width:240px; text-align:center;">

हिंदी

</a>

`;

}

/* INVALID */

if(!type){

title.innerText = "Invalid Access";

container.innerHTML = `

<a href="/category.html"
class="lyrics-btn"
style="width:240px; text-align:center;">

Go to Categories

</a>

`;

}

</script>

<script src="/js/menu.js"></script>

</body>

</html>
