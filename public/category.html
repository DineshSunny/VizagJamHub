<!-- =================================
     LIVE TEXT TYPING 
================================= -->


<script>

const words = [

"LIVE MUSIC",
"JAM SESSIONS",
"VIZAG CULTURE",
"NIGHT VIBES",
"LIVE PERFORMANCES",
"MUSIC COMMUNITY"

];

const typing = document.getElementById("typing");

let index = 0;

typing.textContent = words[index];
typing.classList.add("show");

setInterval(() => {

typing.classList.remove("show");
typing.classList.add("hide");

setTimeout(() => {

index = (index + 1) % words.length;

typing.textContent = words[index];

typing.classList.remove("hide");
typing.classList.add("show");

}, 900);

}, 3200);

</script>
