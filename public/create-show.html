<!DOCTYPE html>
<html>

<head>

<!-- =================================
     Page Title
================================= -->

<title>Create Show - Vizag JamHub</title>

<link rel="stylesheet" href="/css/style.css">

</head>

<body>

<!-- =================================
     VIDEO BACKGROUND
================================= -->

<video autoplay muted loop playsinline id="bg-video">
<source src="/Video/1.mp4" type="video/mp4">
</video>


<!-- =================================
     CREATE SHOW FORM
================================= -->

<section class="login-section">

<h1 class="login-title">Create New Show</h1>

<form class="login-form" id="showForm">

<!-- Show Title -->

<input name="title" id="showName" placeholder="Show Name" required>

<!-- Venue -->

<input name="venue" id="venue" placeholder="Venue / Place" required>

<!-- Address -->

<input name="address" id="address" placeholder="Address" required>

<!-- Show Date -->

<input type="date" name="date" id="date" required>

<!-- Start Time -->

<input type="time" name="startTime" id="startTime" required>

<!-- End Time -->

<input type="time" name="endTime" id="endTime" required>

<!-- Ticket Price -->
 
<input type="number" name="price" id="price" placeholder="Ticket Price ($)" required>

<!-- Poster Upload -->

<input type="file" name="poster" id="poster">

<!-- Extra Information -->

<textarea name="info" id="info" class="extra-info" placeholder="Extra Information"></textarea>

<!-- Submit Button -->

<button type="submit">Create Show</button>

</form>

</section>

<script src="/js/admin.js"></script>

</body>
</html>
