<!DOCTYPE html>
<html>

<head>

<!-- =================================
     Page Title
================================= -->

<title>Create Show - Vizag JamHub</title>

<link rel="stylesheet" href="/css/style.css">

</head>

<body>

<!-- =================================
     VIDEO BACKGROUND
================================= -->

<video autoplay muted loop playsinline id="bg-video">
<source src="/Video/1.mp4" type="video/mp4">
</video>


<!-- =================================
     CREATE SHOW FORM
================================= -->

<section class="login-section">

<h1 class="login-title">Create New Show</h1>

<form class="login-form" id="showForm">

<input id="showName" placeholder="Show Name" required>

<input id="venue" placeholder="Venue / Place" required>

<input id="address" placeholder="Address" required>

<input type="date" id="date" required>

<input type="time" id="startTime" required>

<input type="time" id="endTime" required>

<input type="file" id="poster">

<textarea id="info" class="extra-info" placeholder="Extra Information"></textarea>

<button type="submit">Create Show</button>

</form>

</section>

<script src="/js/admin.js"></script>

</body>
</html>
