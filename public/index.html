<script>

/* =================================
   GALLERY IMAGE POPUP SCRIPT
================================= */


document.addEventListener('click', function(e){

if(e.target.matches('.gallery-track img')){

const popup = document.createElement('div');
popup.classList.add('image-popup');

popup.innerHTML = `<img src="${e.target.src}">`;

document.body.appendChild(popup);

const closePopup = () => {
popup.remove();
window.removeEventListener('scroll', closePopup);
};

setTimeout(() => {

document.addEventListener('click', function outsideClick(event){

if(!event.target.closest('.image-popup img')){
closePopup();
document.removeEventListener('click', outsideClick);
}

});

},100);

window.addEventListener('scroll', closePopup);

}

});

</script>

<!-- SMOOTH SCROLL -->

<script>

document.querySelectorAll('a[href^="#"]').forEach(anchor => {

anchor.addEventListener('click', function(e) {

e.preventDefault();

document.querySelector(this.getAttribute('href')).scrollIntoView({
behavior: 'smooth'
});

});

});

</script>

========================= */

<script>

/* =================================
   OVERLAY LOGO SCROLL FADE
================================= */

const overlayLogo = document.getElementById("overlay-logo");
const lyricsSection = document.querySelector(".lyrics-section");

window.addEventListener("scroll", () => {

const lyricsBottom = lyricsSection.offsetTop + lyricsSection.offsetHeight;

if(window.scrollY > lyricsBottom - 800){

overlayLogo.style.opacity = "0";

}
else{

overlayLogo.style.opacity = "0.9";

}

});

</script>
