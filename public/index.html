<!DOCTYPE html>
<html>
<head>

<title>VizagJamHub</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header>

<h1>VizagJamHub</h1>

<nav>

<a href="#school">Guitar School</a>
<a href="#shows">Shows</a>
<a href="#book">Book Us</a>
<a href="#connect">Band Connect</a>
<a href="#gallery">Gallery</a>

</nav>

</header>


<section id="shows">

<h2>Upcoming Shows</h2>

<div class="cards">

<a href="ticket.html?event=beach-rock-night" class="card">
<h3>Beach Rock Night</h3>
<p>RK Beach</p>
<p>July 20</p>
</a>

<a href="ticket.html?event=college-fest" class="card">
<h3>College Fest</h3>
<p>GITAM</p>
<p>Aug 5</p>
</a>

<a href="ticket.html?event=corporate-event" class="card">
<h3>Corporate Event</h3>
<p>Novotel</p>
<p>Aug 18</p>
</a>

</div>

</section>


<section id="book">

<h2>Book Us</h2>

<form action="/book" method="POST">

<input name="name" placeholder="Name">

<input name="email" placeholder="Email">

<input name="location" placeholder="Location">

<input type="date" name="date">

<textarea name="details"></textarea>

<button>Submit</button>

</form>

</section>


<section id="connect">

<h2>Band Connect</h2>

<form action="/connect" method="POST">

<input name="name" placeholder="Name">

<input name="instrument" placeholder="Instrument">

<input name="experience" placeholder="Experience">

<input name="city" placeholder="City">

<textarea name="message"></textarea>

<button>Connect</button>

</form>

</section>

</body>
</html>
