<!DOCTYPE html>
<html>

<head>
  <title>Hindi Songs | Vizag JamHub</title>

  <!-- MOBILE VIEW ZOOM -->

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="/css/style.css">

  <link rel="stylesheet"
  href="css/mobile.css"
  media="screen and (max-width:768px)">

</head>

<body>

<!-- SUBTLE VIDEO BACKGROUND -->

<video autoplay muted loop playsinline preload="metadata" class="lyrics-video">
<source src="/Video/3.mp4" type="video/mp4">
</video>

<!-- =================================

================================= -->

<div class="music-notes">

<span>♪</span>

</div>

<!-- HAMBURGER BUTTON -->

<header>

<nav>

<div class="menu-toggle">&#9776;</div>

<ul class="nav-links">

<li><a href="/index.html">Home</a></li>

<li><a href="/category.html">Song Categories</a></li>

<li><a href="/englishsongs.html">English Songs</a></li>

<li><a href="/language.html?type=telugu">Telugu Songs</a></li>

<li><a href="/index.html#school">School</a></li>

<li><a href="/index.html#connect">Band Connect</a></li>

<li><a href="/index.html#gallery">Gallery</a></li>

</ul>

</nav>

</header>

<!-- LYRICS PAGE -->

<section class="lyrics-page">

  <!-- SEARCH -->

  <input
    type="text"
    id="searchInput"
    placeholder="🔍 Search songs..."
    class="search-bar"
  />

  <!-- SONG LIST -->

  <div id="lyrics-container"></div>

</section>

<script>

document.addEventListener("DOMContentLoaded", () => {

  const container = document.getElementById("lyrics-container");
  const searchInput = document.getElementById("searchInput");

  let songsData = [];

  // LOAD HINDI DATA

  fetch("/api/hindisongs")
  .then(res => res.json())
  .then(data => {

    songsData = data;

    renderSongs(data);

  })
  .catch(err => {

    console.error("FETCH ERROR:", err);

    container.innerHTML =
    "<p>Error loading songs</p>";

  });

  // RENDER SONG LIST

  function renderSongs(data){

    container.innerHTML = "";

    data.sort((a, b) =>
      a.song.localeCompare(b.song)
    );

    let currentLetter = "";

    data.forEach(song => {

      const firstLetter =
      song.song.charAt(0).toUpperCase();

      if(firstLetter !== currentLetter){

        currentLetter = firstLetter;

        const section =
        document.createElement("div");

        section.innerHTML = `
          <h2 style="margin-top:30px; color:#00d4ff;">
          🎵 ${currentLetter}
          </h2>
        `;

        container.appendChild(section);

      }

      const item =
      document.createElement("div");

      item.classList.add("song-item");

      item.innerHTML = `
        ${song.song} –
        <span style="color:#aaa;">
        ${song.movie}
        </span>
      `;

      item.addEventListener("click", () =>
      showLyrics(song));

      container.appendChild(item);

    });

  }

  // SEARCH

  searchInput.addEventListener("input", () => {

    const value =
    searchInput.value.toLowerCase();

    const filtered =
    songsData.filter(song =>
      song.song.toLowerCase()
      .includes(value)
    );

    renderSongs(filtered);

  });

  // SHOW LYRICS

  window.showLyrics = function(song){

    const params =
    new URLSearchParams(window.location.search);

    const scriptType =
    params.get("script") || "english";

    let lyricsText =
    scriptType === "english"
    ? song.lyrics_english
    : song.lyrics_hindi;

    container.innerHTML = `

      <div
      style="
      width:100%;
      margin:40px 0;
      padding:0 20px;
      ">

      <h2>${song.song}</h2>

      <p style="opacity:0.7;">
      ${song.movie}
      </p>

      <p
      style="
      margin-top:20px;
      white-space:pre-line;
      line-height:1.9;
      font-size:16px;
      text-align:left;
      ">

      ${lyricsText || "Lyrics coming soon..."}

      </p>

      <br>

      <button
      onclick="location.href='/language.html?type=hindi'"
      class="lyrics-btn">

      ⬅ Back to Languages

      </button>

      </div>

    `;

    goTop(true);

  }

});

</script>

<!-- HAMBURGER MENU SCRIPT -->

<script src="/js/menu.js"></script>

</body>

</html>
