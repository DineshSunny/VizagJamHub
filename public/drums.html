<!DOCTYPE html>
<html>

<head>

<title>Vizag JamHub Drum School</title>
<link rel="stylesheet" href="/css/style.css">

  <title>Lyrics | Vizag JamHub</title>

  <!-- MOBILE VIEW ZOOM  -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
background:url("https://images.unsplash.com/photo-1506157786151-b8491531f063") center/cover no-repeat fixed;
color:white;
text-align:center;
padding:60px 20px;
}

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.75);
z-index:-1;
}

.course{
background:rgba(20,20,20,0.85);
padding:25px;
margin:20px auto;
max-width:500px;
border-radius:10px;
border:1px solid white;
transition:0.3s;
}

.course:hover{
transform:translateY(-8px);

box-shadow:
0 0 10px #00d4ff,
0 0 25px #00d4ff,
0 0 40px #00d4ff;
}

h1{
margin-bottom:10px;
color:white;
}

h2{
margin-top:40px;
}

form{
margin-top:20px;
display:flex;
flex-direction:column;
gap:15px;
max-width:400px;
margin-left:auto;
margin-right:auto;
}

input, select{
padding:12px;
border-radius:6px;
background:black;
color:white;
border:1px solid white;
}

button{
padding:12px;
background:black;
border:2px solid white;
border-radius:6px;
color:white;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{

border-color:#00d4ff;
color:#00d4ff;

box-shadow:
0 0 10px #00d4ff,
0 0 25px #00d4ff;

transform:scale(1.05);
}

</style>

</head>

<body>

<h1>Vizag JamHub Drum School</h1>

<p>Learn rhythm, timing and professional drumming skills.</p>

<h2>Courses</h2>

<div class="course">
<h3>Beginner Drums</h3>
<p>Basic drum grooves and coordination.</p>
</div>

<div class="course">
<h3>Intermediate Drums</h3>
<p>Fill techniques, timing control and band playing.</p>
</div>

<div class="course">
<h3>Advanced Drums</h3>
<p>Advanced polyrhythms and stage performance.</p>
</div>

<h2>Enroll Now</h2>

<form id="drumForm">

<input placeholder="Name" required>

<input placeholder="Email" required>

<select>

<option>Beginner</option>
<option>Intermediate</option>
<option>Advanced</option>

</select>

<button type="submit">Enroll</button>

</form>

<script src="/js/drums.js"></script>

</body>

</html>
