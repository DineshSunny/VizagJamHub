<!DOCTYPE html>
<html>

<head>

<title>VizagJamHub Guitar School</title>
<link rel="stylesheet" href="/css/style.css">

</head>

<body>

<h1>VizagJamHub Guitar School</h1>

<p>Learn guitar with structured courses.</p>

<h2>Courses</h2>

<div class="course">

<h3>Beginner Guitar</h3>

<p>
Learn chords, rhythm, and basic songs.
</p>

</div>

<div class="course">

<h3>Intermediate Guitar</h3>

<p>
Learn scales, lead playing, and improvisation.
</p>

</div>

<div class="course">

<h3>Advanced Guitar</h3>

<p>
Advanced techniques, soloing, and stage performance.
</p>

</div>

<h2>Enroll Now</h2>

<form id="guitarForm">

<input id="name" placeholder="Name" required>

<input id="email" placeholder="Email" required>

<select id="level">

<option value="Beginner">Beginner</option>
<option value="Intermediate">Intermediate</option>
<option value="Advanced">Advanced</option>

</select>

<button type="submit">Enroll</button>

</form>

<script src="/js/guitar.js"></script>

</body>

</html>
