<script>

fetch("/api/lyrics")
.then(res => res.json())
.then(data => {

  const container = document.getElementById("lyrics-container");

  data.forEach(song => {

    const card = document.createElement("div");
    card.classList.add("lyrics-card");

    card.innerHTML = `
      <h3>${song.song}</h3>
      <p>${song.artist}</p>
    `;

    // 🔥 CLICK → SHOW LYRICS
    card.addEventListener("click", () => {
      showLyrics(song);
    });

    container.appendChild(card);

  });

});

function showLyrics(song){

  const container = document.getElementById("lyrics-container");

  container.innerHTML = `
    <div style="max-width:800px; margin:auto; text-align:center;">
      <h1>${song.song}</h1>
      <h3>${song.artist}</h3>

      <p style="margin-top:20px; white-space:pre-line; text-align:left;">
        ${song.lyrics}
      </p>

      <br><br>

      <button onclick="location.reload()" class="lyrics-btn">
        ⬅ Back to Songs
      </button>
    </div>
  `;

}

</script>
