<!DOCTYPE html>
<html>

<head>

<title>Buy Tickets</title>

<link rel="stylesheet" href="css/style.css">
  <!-- MOBILE VIEW -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

/* BUY TICKET LAYOUT */

.ticket-wrapper{
max-width:700px;
margin:80px auto;
text-align:center;
}

.ticket-info{
display:flex;
align-items:center;
gap:20px;
justify-content:center;
margin-bottom:25px;
}

.ticket-info img{
width:120px;
border-radius:8px;
}

.ticket-details{
text-align:left;
}

#ticketForm{
display:flex;
flex-direction:column;
gap:15px;
max-width:400px;
margin:0 auto;
}

</style>

</head>

<body>

<div class="ticket-wrapper">

<h2>Buy Tickets</h2>

<div class="ticket-info">

<img id="poster">

<div class="ticket-details">

<h3 id="title"></h3>

<p id="venue"></p>

<p id="date"></p>

<p id="time"></p>

<p id="price"></p>

</div>

</div>


<form id="ticketForm">

<input
type="text"
id="name"
placeholder="Your Name"
required
>

<input
type="tel"
id="phone"
placeholder="Phone Number"
pattern="[0-9]{10}"
maxlength="10"
inputmode="numeric"
required
>

<input
type="email"
id="email"
placeholder="Email (optional)"
>

<input
type="number"
id="quantity"
value="1"
min="1"
>

<p id="total"></p>

<button type="submit" class="glow-button">
Buy Tickets
</button>

</form>

</div>

<script src="js/buy-ticket.js"></script>

</body>

</html>
