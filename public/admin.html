<!DOCTYPE html>
<html>

<head>

<!-- =================================
     Page Title
================================= -->

<title>Vizag JamHub Admin</title>

<!-- MOBILE VIEW -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Main styling -->
<link rel="stylesheet" href="/css/style.css">

</head>

<body>

<!-- =================================
     VIDEO BACKGROUND
     Concert video running behind
     the admin dashboard
================================= -->

<video autoplay muted loop playsinline id="bg-video">
<source src="/Video/1.mp4" type="video/mp4">
</video>


<!-- =================================
     ADMIN PANEL
     Main admin control section
================================= -->

<section class="admin-panel">

<!-- Dashboard title -->

<h1 class="admin-title">Vizag JamHub Admin</h1>

<div class="admin-buttons">

<!-- Navigate to Create Show page -->

<button class="admin-btn" onclick="location.href='/create-show.html'">
Create Show
</button>

<!-- Navigate to Manage Shows page -->

<button class="admin-btn" onclick="location.href='/manage-shows.html'">
Manage Shows
</button>

<!-- Navigate to Tickets page -->

<button class="admin-btn" onclick="location.href='/tickets.html'">
Tickets
</button>

<!-- Logout button (Firebase) -->

<button class="admin-btn" onclick="logout()">
Logout
</button>

</div>

</section>


<!-- =================================
     FIREBASE AUTH PROTECTION SCRIPT
     Protects admin + handles logout
================================= -->

<script type="module">

/* ================================
   Import Firebase SDK
================================ */

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";


/* ================================
   Firebase Configuration
================================ */

const firebaseConfig = {
  apiKey: "AIzaSyCBdBQ7wvLJkeGyMByazMigfDO9MRZEhl0",
  authDomain: "vizagjamhub-d428a.firebaseapp.com",
  projectId: "vizagjamhub-d428a",
  appId: "1:577169499041:web:2d5ed9a35f62dbe847a1e0"
};


/* ================================
   Initialize Firebase
================================ */

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);


/* ================================
   PROTECT ADMIN PAGE
   Redirect if not logged in
================================ */

onAuthStateChanged(auth, (user) => {

  if (!user) {

    // Not logged in → go to login
    window.location.href = "/login.html";
    return;

  }

  // 🔐 Allow only YOUR email
  if (user.email !== "vizagjamhub@gmail.com") {

    alert("Access denied");
    window.location.href = "/";

  }

});


/* ================================
   LOGOUT FUNCTION
================================ */

window.logout = function () {

  signOut(auth).then(() => {

    window.location.href = "/login.html";

  });

};

</script>

</body>
</html>
