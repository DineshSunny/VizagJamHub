<!DOCTYPE html>
<html>

<head>

<!-- =================================
     Page Title
================================= -->

<title>Vizag JamHub Admin</title>

<!-- Main website stylesheet -->

<link rel="stylesheet" href="/css/style.css">

</head>

<body>

<!-- =================================
     VIDEO BACKGROUND
     Concert video running behind
     the admin dashboard
================================= -->

<video autoplay muted loop playsinline id="bg-video">
<source src="/Video/1.mp4" type="video/mp4">
</video>


<!-- =================================
     ADMIN PANEL
     Main admin control section
================================= -->

<section class="admin-panel">

<!-- Dashboard title -->

<h1 class="admin-title">Vizag JamHub Admin</h1>

<div class="admin-buttons">

<!-- Navigate to Create Show page -->

<button class="admin-btn" onclick="location.href='/create-show.html'">
Create Show
</button>

<!-- Navigate to Manage Shows page -->

<button class="admin-btn" onclick="location.href='/manage-shows.html'">
Manage Shows
</button>

<!-- Navigate to Tickets page -->

<button class="admin-btn" onclick="location.href='/tickets.html'">
Tickets
</button>

<!-- Logout button triggers logout() in auth.js -->

<button class="admin-btn" onclick="logout()">
Logout
</button>

</div>

</section>


<!-- =================================
     AUTHENTICATION SCRIPT
     Handles login protection + logout
================================= -->

<script src="/js/auth.js"></script>


<!-- =================================
     ADMIN DASHBOARD SCRIPT
     Will manage shows and tickets
================================= -->

<script src="/js/auth.js"></script>

</body>
</html>
